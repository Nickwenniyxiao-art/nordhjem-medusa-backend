# Beszel Hub — VPS2 (94.72.125.79)
# RFC-001: Lightweight server monitoring dashboard
#
# DEPLOY TO: VPS2 only (monitoring server)
# Access: http://94.72.125.79:8090
#
# DEPLOY PROCEDURE:
# 1. SSH to VPS2 (via authorized AI governance workflow)
# 2. mkdir -p /opt/beszel && cd /opt/beszel
# 3. Copy this file and run: docker compose up -d
# 4. Open :8090, create admin account, copy Agent key
# 5. Deploy Beszel Agent to VPS1 using the key

services:
  beszel-hub:
    image: henrygd/beszel:latest
    container_name: beszel-hub
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - beszel_data:/beszel_data
    environment:
      - TZ=UTC
    # Hub listens for Agent connections on :45876 internally
    # Agents connect via WebSocket to the Hub's public address

volumes:
  beszel_data:
    driver: local
