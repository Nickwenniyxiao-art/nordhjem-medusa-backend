version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "type: dependencies"
      - "priority: P2"
    commit-message:
      prefix: "chore(deps):"
    ignore:
      # 忽略 Medusa 核心包的自动更新（需要手动测试兼容性）
      - dependency-name: "@medusajs/*"
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
    labels:
      - "type: dependencies"
    commit-message:
      prefix: "chore(ci):"
