name: Deploy Ops Scripts → VPS

on:
  push:
    branches: [main]
    paths:
      - 'ops/scripts/**'
  workflow_dispatch:
    inputs:
      confirm:
        description: '确认部署 ops 脚本到生产服务器'
        required: true
        default: 'yes'

# 唯一合法的 ops 脚本部署通道
# 所有对 VPS ops/scripts/ 的部署必须通过此 workflow
# 直接 SSH 部署属于框架违规行为

permissions:
  contents: read

jobs:
  deploy:
    name: 🚀 Deploy ops scripts → VPS1
    runs-on: ubuntu-latest
    environment: production  # Owner 必须在 GitHub 手动 approve
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate scripts exist
        run: |
          echo "=== Scripts to deploy ==="
          ls -la ops/scripts/
          echo ""
          for script in ops/scripts/*.sh; do
            echo "Checking: $script"
            bash -n "$script" && echo "  ✅ Syntax OK" || { echo "  ❌ Syntax ERROR"; exit 1; }
          done

      - name: Deploy scripts to VPS1
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          # Setup SSH
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Create target directory
          ssh -i ~/.ssh/deploy_key root@"$DEPLOY_HOST" \
            "mkdir -p /opt/nordhjem/scripts && mkdir -p /var/log/nordhjem"

          # Deploy scripts
          scp -i ~/.ssh/deploy_key ops/scripts/*.sh root@"$DEPLOY_HOST":/opt/nordhjem/scripts/

          # Make executable
          ssh -i ~/.ssh/deploy_key root@"$DEPLOY_HOST" \
            "chmod +x /opt/nordhjem/scripts/*.sh"

          echo "✅ Scripts deployed"

      - name: Update crontab on VPS1
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          ssh -i ~/.ssh/deploy_key root@"$DEPLOY_HOST" << 'REMOTE'
            # Remove old nordhjem ops entries, add fresh ones
            (crontab -l 2>/dev/null | grep -v 'nordhjem\|disk-alert\|docker-cleanup') | crontab -

            (crontab -l 2>/dev/null; \
             echo "# NordHjem Ops — disk alert (RFC-001)"; \
             echo "7 * * * * /opt/nordhjem/scripts/disk-alert.sh"; \
             echo "# NordHjem Ops — Docker cleanup (RFC-001)"; \
             echo "0 3 * * 0 /opt/nordhjem/scripts/docker-cleanup.sh") | crontab -

            echo "=== Current crontab ==="
            crontab -l
          REMOTE
          echo "✅ Crontab updated"

      - name: Verify deployment
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Verify files exist and are executable
          ssh -i ~/.ssh/deploy_key root@"$DEPLOY_HOST" \
            "ls -la /opt/nordhjem/scripts/ && crontab -l"

          # Send Telegram notification
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d parse_mode="HTML" \
              -d text="✅ <b>Ops Scripts Deployed</b>
Workflow: deploy-ops-scripts.yml
Commit: <code>${{ github.sha }}</code>
Deployed by: ${{ github.actor }}
Scripts: disk-alert.sh, docker-cleanup.sh
Crontab: updated" > /dev/null
          fi

          echo "✅ Deployment verified"
