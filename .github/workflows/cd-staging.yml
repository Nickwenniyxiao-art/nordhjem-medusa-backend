name: "CD — Staging"

on:
  push:
    branches: [staging]

concurrency:
  group: cd-staging-backend
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  deploy-staging:
    name: "🚀 Deploy → Staging"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Backup staging database
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -e
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            BACKUP_DIR="/opt/nordhjem/backups/staging"
            mkdir -p $BACKUP_DIR

            # 自动发现 PostgreSQL 容器
            POSTGRES_CONTAINER=""
            for candidate in nordhjem_postgres nordhjem_postgres_production nordhjem-postgres; do
              if docker ps -a --format '{{.Names}}' | grep -qx "$candidate"; then
                POSTGRES_CONTAINER="$candidate"
                break
              fi
            done

            if [ -z "$POSTGRES_CONTAINER" ]; then
              echo "⚠️ PostgreSQL container not found, skipping backup"
              exit 0
            fi

            # 从 staging Medusa 容器获取数据库名
            MEDUSA_CONTAINER="nordhjem_medusa_staging"
            DATABASE_URL=$(docker inspect "$MEDUSA_CONTAINER" --format '{{range .Config.Env}}{{println .}}{{end}}' 2>/dev/null | grep "DATABASE_URL=" | cut -d= -f2- || true)
            DB_NAME=$(echo "$DATABASE_URL" | sed -n 's|.*\/\([^?]*\).*|\1|p')
            DB_USER=$(echo "$DATABASE_URL" | sed -n 's|.*://\([^:]*\):.*|\1|p')

            if [ -z "$DB_NAME" ]; then
              DB_NAME="nordhjem_staging"
              DB_USER="postgres"
              echo "⚠️ Could not detect DB name, using default: $DB_NAME"
            fi

            echo "=== Backing up staging database ($DB_NAME) ==="
            docker exec $POSTGRES_CONTAINER pg_dump \
              -U "$DB_USER" \
              -d "$DB_NAME" \
              -F c \
              -f /tmp/backup_staging_${TIMESTAMP}.dump

            docker cp $POSTGRES_CONTAINER:/tmp/backup_staging_${TIMESTAMP}.dump \
              ${BACKUP_DIR}/backup_staging_${TIMESTAMP}.dump

            docker exec $POSTGRES_CONTAINER rm -f /tmp/backup_staging_${TIMESTAMP}.dump

            # 保留最近 5 个备份（staging 保留较少）
            cd $BACKUP_DIR && ls -t *.dump 2>/dev/null | tail -n +6 | xargs -r rm

            echo "✅ Staging backup complete: backup_staging_${TIMESTAMP}.dump"

      - name: Deploy to staging environment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            CONTAINER="nordhjem_medusa_staging"
            REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            IMAGE="ghcr.io/${REPO_LOWER}:staging"
            PORT=9002

            echo "=== Recording current image for rollback ==="
            BACKUP_DIR="/opt/nordhjem/backups/staging"
            mkdir -p $BACKUP_DIR
            CURRENT_IMAGE=$(docker inspect $CONTAINER --format='{{.Config.Image}}' 2>/dev/null || echo "none")
            echo "$CURRENT_IMAGE" > ${BACKUP_DIR}/last-good-image.txt
            echo "Saved rollback image: $CURRENT_IMAGE"

            echo "=== Pulling latest image ==="
            docker pull $IMAGE

            echo "=== Saving env vars ==="
            ENV_FILE="/tmp/${CONTAINER}_env.txt"

            # Try to get env from existing container
            if docker inspect $CONTAINER > /dev/null 2>&1; then
              docker inspect $CONTAINER --format '{{range .Config.Env}}{{println .}}{{end}}' > $ENV_FILE 2>/dev/null || true
              echo "Env vars exported from existing container"
            fi

            # Fallback: if no env file or empty, try production container's env as template
            if [ ! -f "$ENV_FILE" ] || [ ! -s "$ENV_FILE" ]; then
              echo "⚠️ No existing staging container found, trying production container as template..."
              PROD_CONTAINER="nordhjem_medusa"
              if docker inspect $PROD_CONTAINER > /dev/null 2>&1; then
                docker inspect $PROD_CONTAINER --format '{{range .Config.Env}}{{println .}}{{end}}' > $ENV_FILE 2>/dev/null || true
                # Override database to staging
                if [ -f "$ENV_FILE" ] && [ -s "$ENV_FILE" ]; then
                  sed -i 's/nordhjem_production/nordhjem_staging/g' $ENV_FILE
                  echo "Env vars derived from production container (with staging overrides)"
                fi
              fi
            fi

            # Final check
            if [ ! -f "$ENV_FILE" ] || [ ! -s "$ENV_FILE" ]; then
              echo "❌ ERROR: Cannot obtain environment variables."
              echo "Neither staging container ($CONTAINER) nor production container (nordhjem_medusa) exist."
              echo "Please create the staging environment first by deploying manually."
              echo "Running containers:"
              docker ps --format 'table {{.Names}}\t{{.Status}}'
              exit 1
            fi

            echo "=== Running DB migration ==="
            if ! docker run --rm --network nordhjem_backend --env-file $ENV_FILE $IMAGE npx medusa db:migrate; then
              echo "❌ DB migration failed!"
              echo "⚠️ WARNING: Database may be in an inconsistent state."
              echo "⚠️ Medusa does not support automatic migration rollback (no down migration)."
              echo "⚠️ Manual intervention required — check DB schema and restore from backup if needed."
              echo "⚠️ Backup location: /opt/nordhjem/backups/staging/"
              exit 1
            fi
            echo "✅ DB migration successful"

            echo "=== Replacing container ==="
            docker stop $CONTAINER 2>/dev/null || true
            docker rm $CONTAINER 2>/dev/null || true

            docker create --name $CONTAINER --publish $PORT:9000 --restart unless-stopped --env-file $ENV_FILE $IMAGE npx medusa start

            docker network connect nordhjem_backend $CONTAINER 2>/dev/null || true
            docker network connect nordhjem_frontend $CONTAINER 2>/dev/null || true
            docker start $CONTAINER
            rm -f $ENV_FILE
            echo "=== Deploy staging complete ==="

      - name: Health check (staging)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 3m
          script: |
            set -e
            CONTAINER="nordhjem_medusa_staging"
            PORT=9002
            BACKUP_DIR="/opt/nordhjem/backups/staging"

            sleep 30
            for i in 1 2 3 4 5 6 7 8; do
              STATUS=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:${PORT}/health 2>/dev/null || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "✅ Staging health check passed (attempt $i)"
                exit 0
              fi
              echo "Attempt $i/8: HTTP $STATUS, waiting 15s..."
              sleep 15
            done

            echo "❌ Health check failed after 8 attempts, initiating rollback..."
            docker logs $CONTAINER --tail 50 2>&1 || true

            LAST_GOOD=$(cat ${BACKUP_DIR}/last-good-image.txt 2>/dev/null || echo "none")
            if [ "$LAST_GOOD" = "none" ] || [ -z "$LAST_GOOD" ]; then
              echo "⚠️ No previous image recorded, cannot auto-rollback"
              echo "⚠️ Manual intervention required"
              exit 1
            fi

            echo "🔄 Rolling back to: $LAST_GOOD"

            # 获取环境变量
            ENV_FILE="/tmp/${CONTAINER}_rollback_env.txt"
            docker inspect $CONTAINER --format '{{range .Config.Env}}{{println .}}{{end}}' > $ENV_FILE 2>/dev/null || true

            docker stop $CONTAINER 2>/dev/null || true
            docker rm $CONTAINER 2>/dev/null || true

            docker create --name $CONTAINER \
              --publish ${PORT}:9000 \
              --restart unless-stopped \
              --env-file $ENV_FILE \
              $LAST_GOOD npx medusa start

            docker network connect nordhjem_backend $CONTAINER 2>/dev/null || true
            docker network connect nordhjem_frontend $CONTAINER 2>/dev/null || true
            docker start $CONTAINER
            rm -f $ENV_FILE

            sleep 20
            ROLLBACK_STATUS=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:${PORT}/health 2>/dev/null || echo "000")
            if [ "$ROLLBACK_STATUS" = "200" ]; then
              echo "✅ Rollback successful — running on previous version: $LAST_GOOD"
              echo "⚠️ New deployment failed but service restored. Please investigate."
            else
              echo "❌ Rollback also failed (HTTP $ROLLBACK_STATUS)"
              echo "⚠️ CRITICAL: Service may be down. Manual intervention required immediately."
            fi
            exit 1

      - name: Log deployment event
        if: success()
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.BOT_PAT }}
          script: |
            const now = new Date().toISOString().replace('T', ' ').substring(0, 19);
            const sha = context.sha.substring(0, 7);
            const actor = context.actor;
            const newLine = `| ${now} | staging | ${sha} | ${actor} | cd-staging |`;

            const defaultHeader = [
              '# 部署事件日志',
              '',
              '> 自动记录每次成功部署的时间、版本和环境。',
              '> 由 cd-staging.yml 和 cd-production.yml 自动更新。',
              '',
              '| 时间 (UTC) | 环境 | 版本 (SHA) | 触发者 | 工作流 |',
              '|------------|------|-----------|--------|--------|',
            ].join('\n');

            let content;
            let fileSha;
            try {
              const file = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: 'docs/DEPLOY-LOG.md',
                ref: 'develop'
              });
              content = Buffer.from(file.data.content, 'base64').toString('utf8');
              fileSha = file.data.sha;
            } catch (e) {
              content = `${defaultHeader}\n`;
              fileSha = undefined;
            }

            content = content.trimEnd() + '\n' + newLine + '\n';

            const lines = content.split('\n');
            const separatorIndex = lines.findIndex((line) => line.startsWith('|------------'));
            const headerLines = separatorIndex >= 0 ? lines.slice(0, separatorIndex + 1) : defaultHeader.split('\n');
            const dataLines = lines.slice(separatorIndex + 1).filter((line) => line.startsWith('|'));
            const trimmedData = dataLines.slice(-100);
            content = headerLines.join('\n') + '\n' + trimmedData.join('\n') + '\n';

            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'docs/DEPLOY-LOG.md',
              message: 'docs: log staging deployment [skip ci]',
              content: Buffer.from(content).toString('base64'),
              branch: 'develop',
              ...(fileSha ? { sha: fileSha } : {})
            });

            console.log(`✅ Logged staging deployment: ${sha} by ${actor}`);

  e2e-staging:
    name: "🧪 E2E → Staging"
    needs: deploy-staging
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Run backend staging verification
        run: |
          echo "=== Backend Staging Environment Verification ==="

          echo "--- Health check ---"
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" http://${{ secrets.DEPLOY_HOST }}:9002/health || echo "000")
          echo "Health: HTTP $STATUS"
          [ "$STATUS" = "200" ] || { echo "❌ Health check failed"; exit 1; }

          echo "--- Store API check ---"
          RESP=$(curl -sf "http://${{ secrets.DEPLOY_HOST }}:9002/store/products?limit=1" \
            -H "x-publishable-api-key: pk_64112cda99be1a3e9cdc3d722df9d3dfbbcd19759306897a6dafd4c7e068ebe3" || echo "FAILED")
          if echo "$RESP" | grep -q '"products"'; then
            echo "✅ Store API returned products"
          else
            echo "❌ Store API failed: $RESP"
            exit 1
          fi

          echo "✅ All staging E2E checks passed"

  smoke-test:
    name: "💨 Smoke Test → Staging"
    needs: e2e-staging
    uses: ./.github/workflows/smoke-test.yml
    with:
      environment: staging
      port: "9002"
    secrets: inherit

  promote-to-production:
    name: "🔀 Promote → Production"
    needs: smoke-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.BOT_PAT }}

      - name: Create promote PR staging to main
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
        run: |
          EXISTING_PR=$(gh pr list --repo ${{ github.repository }} --base main --head staging --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING_PR" ] && [ "$EXISTING_PR" != "null" ]; then
            echo "Promote PR #${EXISTING_PR} already exists"
          else
            gh pr create \
              --repo ${{ github.repository }} \
              --base main \
              --head staging \
              --title "release: promote staging to production" \
              --body "Automated promote PR. Staging deploy + E2E + smoke-test all passed. Merge to trigger cd-production."
            echo "Promote PR created"
          fi
