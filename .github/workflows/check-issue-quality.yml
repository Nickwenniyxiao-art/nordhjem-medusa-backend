name: AI Issue Quality Review

on:
  pull_request:
    branches: [develop, staging, main]
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write

# ──────────────────────────────────────────────────────────────
# AI Issue Quality Review
# ──────────────────────────────────────────────────────────────
# Phase 1: Informational only (NOT a hard gate)
# Scores Issue + PR quality across 5 dimensions.
# Posts structured review comment on PR.
# Adds `ai-approved` label if score >= 7.0 and no ❌.
# ──────────────────────────────────────────────────────────────

jobs:
  check-issue-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract PR and Issue data
        id: extract
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set +e

          gh pr view "$PR_NUMBER" --json body,title -q '.' > /tmp/pr_data.json 2>/dev/null || echo '{"body":"","title":""}' > /tmp/pr_data.json
          jq -r '.body // ""' /tmp/pr_data.json > /tmp/pr_body.txt
          jq -r '.title // ""' /tmp/pr_data.json > /tmp/pr_title.txt

          PR_BODY=$(cat /tmp/pr_body.txt)
          ISSUE_NUMBER=$(echo "$PR_BODY" | perl -ne 'print "$1\n" if /(?:closes|fixes|resolves|refs?)\s*#(\d+)/i' | head -1)

          if [ -z "$ISSUE_NUMBER" ]; then
            echo "false" > /tmp/has_issue.txt
            echo "N/A" > /tmp/issue_title.txt
            echo "" > /tmp/issue_body.txt
          else
            echo "true" > /tmp/has_issue.txt
            gh issue view "$ISSUE_NUMBER" --json title,body -q '.' > /tmp/issue_data.json 2>/dev/null || echo '{"title":"N/A","body":""}' > /tmp/issue_data.json
            jq -r '.title // "N/A"' /tmp/issue_data.json > /tmp/issue_title.txt
            jq -r '.body // ""' /tmp/issue_data.json > /tmp/issue_body.txt
          fi

          gh pr diff "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" 2>/dev/null | head -c 6000 > /tmp/pr_diff.txt || echo "" > /tmp/pr_diff.txt
          gh pr diff "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --name-only 2>/dev/null > /tmp/changed_files.txt || echo "" > /tmp/changed_files.txt

          for f in /tmp/pr_body.txt /tmp/pr_title.txt /tmp/has_issue.txt /tmp/issue_title.txt /tmp/issue_body.txt /tmp/pr_diff.txt /tmp/changed_files.txt; do
            [ -f "$f" ] || echo "" > "$f"
          done

          echo "✅ Data extraction complete"

      - name: AI Issue Quality Review
        id: review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set +e

          if [ -z "$OPENAI_API_KEY" ]; then
            echo "⚠️ OPENAI_API_KEY not set, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          jq -n \
            --rawfile pr_title /tmp/pr_title.txt \
            --rawfile has_issue /tmp/has_issue.txt \
            --rawfile pr_body /tmp/pr_body.txt \
            --rawfile issue_title /tmp/issue_title.txt \
            --rawfile issue_body /tmp/issue_body.txt \
            --rawfile files /tmp/changed_files.txt \
            --rawfile diff /tmp/pr_diff.txt \
            '"## PR 信息\n- PR 标题: " + ($pr_title | rtrimstr("\n")) + "\n- 关联 Issue: " + ($has_issue | rtrimstr("\n")) + "\n- PR 描述:\n" + $pr_body + "\n\n## Issue 信息\n- Issue 标题: " + ($issue_title | rtrimstr("\n")) + "\n- Issue 正文:\n" + $issue_body + "\n\n## PR 变更文件\n" + $files + "\n\n## PR Diff (前 6000 字符)\n" + $diff' \
            | jq -r '.' > /tmp/user_msg.txt

          SYSTEM_PROMPT='你是 NordHjem 项目的 AI Issue 质量审查员。请根据以下 5 个维度对 Issue + PR 进行质量评审，每个维度 0-2 分。\n\n## 审查维度\n1. **ROADMAP 关联性** — Issue 是否关联了 ROADMAP ID (R-Px-xx)，PR 是否引用了正确的 Issue\n2. **描述完整性** — Issue 描述是否清晰、包含背景、目标、实现方向\n3. **验收标准 (AC) 质量** — 是否有明确可验证的验收标准 (Acceptance Criteria)\n4. **PR-Issue 一致性** — PR 的变更是否与 Issue 描述的范围一致，没有超出或遗漏\n5. **粒度合理性** — Issue 是否粒度适中（不过大也不过小），单个 PR 能完成\n\n## 评分标准\n每个维度：\n- 2 分 ✅ — 完全符合要求\n- 1 分 ⚠️ — 部分符合，有改进空间\n- 0 分 ❌ — 不符合要求或缺失\n\n## 输出格式（严格遵守）\n## 🤖 AI Issue 质量审查报告\n\n| 维度 | 评分 | 说明 |\n|------|------|------|\n| ROADMAP 关联性 | {emoji} {score}/2 | {说明} |\n| 描述完整性 | {emoji} {score}/2 | {说明} |\n| AC 质量 | {emoji} {score}/2 | {说明} |\n| PR-Issue 一致性 | {emoji} {score}/2 | {说明} |\n| 粒度合理性 | {emoji} {score}/2 | {说明} |\n\n**总分: {total}/10**\n**建议: {APPROVE / NEEDS_IMPROVEMENT}**\n\n### 改进建议\n{如果有改进空间，列出具体建议；如果全部通过则写"无"}\n\n注意：\n- 如果 PR 没有关联 Issue，ROADMAP 关联性和 AC 质量维度应给 0 分\n- 如果是 CI/CD 配置类的 PR，粒度合理性可以适当放宽\n- emoji 使用: ✅ (2分), ⚠️ (1分), ❌ (0分)'

          jq -n \
            --arg prompt "$SYSTEM_PROMPT" \
            --rawfile user_msg /tmp/user_msg.txt \
            '{
              model: "gpt-4o-mini",
              messages: [
                {role: "system", content: $prompt},
                {role: "user", content: $user_msg}
              ],
              temperature: 0.3,
              max_tokens: 2000
            }' > /tmp/api_request.json

          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d @/tmp/api_request.json)

          REVIEW=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "API call failed"')

          if [ "$REVIEW" = "API call failed" ] || [ -z "$REVIEW" ]; then
            echo "❌ AI review API call failed"
            echo "$RESPONSE" | jq . 2>/dev/null || echo "$RESPONSE"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "$REVIEW" > /tmp/issue_quality_review.md

          SCORE=$(echo "$REVIEW" | perl -ne 'print "$1\n" if /总分[：:]\s*(\d+(?:\.\d+)?)/' | head -1)
          echo "score=${SCORE:-0}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

          HAS_BLOCK=$(echo "$REVIEW" | perl -ne '$c++ if /^\|.*❌.*\d\/2/; END{print $c+0}')
          echo "has_block=$HAS_BLOCK" >> "$GITHUB_OUTPUT"

          echo "📊 Issue Quality Score: ${SCORE:-0}/10 (blocking issues: $HAS_BLOCK)"

      - name: Post quality review comment
        if: always() && steps.review.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let review = '';
            try {
              review = fs.readFileSync('/tmp/issue_quality_review.md', 'utf8');
            } catch {
              review = 'AI Issue quality review completed but output could not be read.';
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `${review}\n\n---\n*Automated review by AI Issue Quality Checker (GPT-4o-mini) · Phase 1: Informational*`
            });

      - name: Add ai-approved label if score >= 7
        if: always() && steps.review.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const score = parseFloat('${{ steps.review.outputs.score }}') || 0;
            const hasBlock = parseInt('${{ steps.review.outputs.has_block }}') || 0;

            console.log(`Score: ${score}, Blocking issues: ${hasBlock}`);

            if (score >= 7.0 && hasBlock === 0) {
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.pull_request.number,
                  labels: ['ai-approved']
                });
                console.log('✅ Added ai-approved label (score: ' + score + ')');
              } catch (err) {
                console.log('⚠️ Could not add label: ' + err.message);
              }
            } else {
              console.log('ℹ️ Score ' + score + ' < 7.0 or has blocking issues (' + hasBlock + '), skipping ai-approved label');
            }
