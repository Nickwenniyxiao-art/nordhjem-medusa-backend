name: Semgrep Security Scan

on:
  pull_request:
    branches: [develop]

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config "p/javascript" \
            --config "p/nodejs" \
            --config "p/typescript" \
            --exclude "node_modules" \
            --exclude "dist" \
            --exclude ".next" \
            --exclude "build" \
            --exclude "package-lock.json" \
            --error \
            --sarif \
            --output semgrep-results.sarif \
            .
        continue-on-error: true

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep-results.sarif
        continue-on-error: true

      - name: Check for errors
        run: |
          semgrep scan \
            --config "p/javascript" \
            --config "p/nodejs" \
            --config "p/typescript" \
            --exclude "node_modules" \
            --exclude "dist" \
            --exclude ".next" \
            --exclude "build" \
            --exclude "package-lock.json" \
            --error \
            --severity ERROR \
            .
