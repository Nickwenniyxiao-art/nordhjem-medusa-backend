name: "🚨 Ops — Emergency VPS Fix"

on:
  workflow_dispatch:
    inputs:
      action:
        description: "执行动作"
        required: true
        type: choice
        options:
          - check-images
          - fix-test-image
        default: fix-test-image

permissions:
  contents: read

jobs:
  emergency-fix:
    name: "Emergency fix"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: SSH fix
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 12m
          script: |
            set -uo pipefail

            echo "=== 1. 镜像对比 ==="
            echo "--- Test ---"
            docker inspect nordhjem_medusa_test --format 'Image={{.Config.Image}} ImageID={{.Image}}' 2>/dev/null
            echo "--- Staging ---"
            docker inspect nordhjem_medusa_staging --format 'Image={{.Config.Image}} ImageID={{.Image}}' 2>/dev/null
            echo "--- nordhjem_medusa (Created) ---"
            docker inspect nordhjem_medusa --format 'Image={{.Config.Image}} ImageID={{.Image}}' 2>/dev/null

            echo ""
            echo "=== 2. Docker images ==="
            docker images | grep -E "nordhjem|REPOSITORY" | head -10

            echo ""
            echo "=== 3. Health endpoint 详细 ==="
            echo "--- test (verbose) ---"
            curl -v http://localhost:9001/health 2>&1
            echo ""
            echo "--- staging (verbose) ---"
            curl -v http://localhost:9002/health 2>&1

            echo ""
            echo "=== 4. 从 test 容器内部 curl health ==="
            docker exec nordhjem_medusa_test sh -c 'curl -sf http://localhost:9000/health' 2>&1 || echo "内部 curl 失败"

            echo ""
            echo "=== 5. staging 用的什么镜像标签？==="
            docker inspect nordhjem_medusa_staging --format '{{.Config.Image}}' 2>/dev/null

            echo ""
            echo "=== 6. 本地所有 nordhjem 镜像 ==="
            docker images --format "table {{.Repository}}\t{{.Tag}}\t{{.ID}}\t{{.CreatedAt}}" | grep -E "nordhjem|REPOSITORY"

            if [ "${{ inputs.action }}" = "fix-test-image" ]; then
              echo ""
              echo "============================================"
              echo "🔧 修复：用 staging 同样的镜像重建 test"
              echo "============================================"
              
              STAGING_IMAGE=$(docker inspect nordhjem_medusa_staging --format '{{.Image}}' 2>/dev/null)
              TEST_IMAGE=$(docker inspect nordhjem_medusa_test --format '{{.Image}}' 2>/dev/null)
              
              echo "Staging ImageID: $STAGING_IMAGE"
              echo "Test ImageID: $TEST_IMAGE"
              
              if [ "$STAGING_IMAGE" = "$TEST_IMAGE" ]; then
                echo "镜像相同，问题不在镜像版本"
                echo ""
                echo "尝试用 staging 的镜像标签重建 test..."
              fi
              
              STAGING_IMAGE_NAME=$(docker inspect nordhjem_medusa_staging --format '{{.Config.Image}}' 2>/dev/null)
              echo "Staging image name: $STAGING_IMAGE_NAME"
              
              echo ""
              echo "=== 保存 test 环境变量 ==="
              ENV_FILE="/tmp/test_env_fix.txt"
              docker inspect nordhjem_medusa_test --format '{{range .Config.Env}}{{println .}}{{end}}' > $ENV_FILE

              echo ""
              echo "=== 用 staging 镜像重建 test ==="
              docker stop nordhjem_medusa_test 2>/dev/null || true
              docker rm nordhjem_medusa_test 2>/dev/null || true
              
              docker create \
                --name nordhjem_medusa_test \
                --publish 9001:9000 \
                --restart unless-stopped \
                --env-file $ENV_FILE \
                --network nordhjem_backend \
                $STAGING_IMAGE_NAME npx medusa start

              docker network connect nordhjem_frontend nordhjem_medusa_test 2>/dev/null || true
              docker start nordhjem_medusa_test
              
              echo "等待 60 秒..."
              sleep 60
              
              echo ""
              echo "=== 验证 ==="
              curl -v http://localhost:9001/health 2>&1
              echo ""
              
              echo ""
              echo "=== 容器日志 ==="
              docker logs nordhjem_medusa_test --tail 20 2>&1
              
              rm -f $ENV_FILE
            fi

            echo ""
            echo "============================================"
            echo "🏁 完成"
            echo "============================================"
