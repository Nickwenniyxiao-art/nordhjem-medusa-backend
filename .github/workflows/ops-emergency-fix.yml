name: "🚨 Ops — Emergency VPS Fix"

on:
  workflow_dispatch:
    inputs:
      action:
        description: "执行动作"
        required: true
        type: choice
        options:
          - deep-diagnose
          - fix-all
        default: fix-all

permissions:
  contents: read

jobs:
  emergency-fix:
    name: "Emergency diagnose & fix"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: SSH emergency fix
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 12m
          script: |
            set -uo pipefail

            echo "============================================"
            echo "🚨 Emergency VPS Fix v3 — Deep Diagnose"
            echo "============================================"

            echo ""
            echo "=== 1. Health endpoint 返回内容（不只是状态码）==="
            echo "--- Port 9001 (test) ---"
            curl -v http://localhost:9001/health 2>&1 || echo "curl 失败"
            echo ""
            echo "--- Port 9002 (staging) ---"
            curl -v http://localhost:9002/health 2>&1 || echo "curl 失败"

            echo ""
            echo "=== 2. Test 容器内部 Redis 连接测试 ==="
            docker exec nordhjem_medusa_test sh -c 'node -e "
              const Redis = require(\"ioredis\");
              const url = process.env.REDIS_URL;
              console.log(\"REDIS_URL:\", url);
              const redis = new Redis(url);
              redis.on(\"connect\", () => { console.log(\"✅ Redis connected\"); redis.quit(); });
              redis.on(\"error\", (e) => { console.log(\"❌ Redis error:\", e.message); process.exit(1); });
              setTimeout(() => { console.log(\"⏰ Timeout\"); process.exit(1); }, 10000);
            "' 2>&1 || echo "Node Redis test failed"

            echo ""
            echo "=== 3. Staging 容器内部 Redis 连接测试（对比）==="
            docker exec nordhjem_medusa_staging sh -c 'node -e "
              const Redis = require(\"ioredis\");
              const url = process.env.REDIS_URL;
              console.log(\"REDIS_URL:\", url);
              const redis = new Redis(url);
              redis.on(\"connect\", () => { console.log(\"✅ Redis connected\"); redis.quit(); });
              redis.on(\"error\", (e) => { console.log(\"❌ Redis error:\", e.message); process.exit(1); });
              setTimeout(() => { console.log(\"⏰ Timeout\"); process.exit(1); }, 10000);
            "' 2>&1 || echo "Node Redis test failed"

            echo ""
            echo "=== 4. Test 容器完整日志（最近50行）==="
            docker logs nordhjem_medusa_test --tail 50 2>&1

            echo ""
            echo "=== 5. Test vs Staging 全部环境变量对比 ==="
            echo "--- TEST ---"
            docker inspect nordhjem_medusa_test --format '{{range .Config.Env}}{{println .}}{{end}}' 2>/dev/null | sort
            echo "--- STAGING ---"
            docker inspect nordhjem_medusa_staging --format '{{range .Config.Env}}{{println .}}{{end}}' 2>/dev/null | sort

            echo ""
            echo "=== 6. Redis 直接从 test 容器内 telnet 测试 ==="
            docker exec nordhjem_medusa_test sh -c 'echo "AUTH Ndhj2026Redis!vQ7p" | nc -w3 redis 6379' 2>&1 || echo "nc 不可用"
            docker exec nordhjem_medusa_test sh -c 'echo -e "AUTH Ndhj2026Redis!vQ7p\r\nPING\r\n" | nc -w3 redis 6379' 2>&1 || echo "测试失败"

            echo ""
            echo "============================================"
            echo "🏁 完成"
            echo "============================================"
