name: "🚨 Ops — Emergency VPS Fix"

on:
  workflow_dispatch:
    inputs:
      action:
        description: "执行动作"
        required: true
        type: choice
        options:
          - fix-test-network
          - fix-all
          - diagnose-compose
        default: fix-all

permissions:
  contents: read

jobs:
  emergency-fix:
    name: "Emergency diagnose & fix"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: SSH emergency fix
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 12m
          script: |
            set -uo pipefail

            echo "============================================"
            echo "🚨 Emergency VPS Fix v2"
            echo "Action: ${{ inputs.action }}"
            echo "============================================"

            echo ""
            echo "=== 1. 当前 Docker 状态 ==="
            docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" | grep -E "nordhjem|NAMES"
            
            echo ""
            echo "=== 2. nordhjem_medusa (Created 状态) 是什么？ ==="
            docker inspect nordhjem_medusa --format 'Image={{.Config.Image}} Status={{.State.Status}} Networks={{range $k,$v := .NetworkSettings.Networks}}{{$k}} {{end}}' 2>/dev/null || echo "容器信息不可用"
            
            echo ""
            echo "=== 3. docker-compose.yml 内容 ==="
            cat /opt/nordhjem/docker-compose.yml

            echo ""
            echo "=== 4. Test 容器网络详情 ==="
            docker inspect nordhjem_medusa_test --format '{{range $k,$v := .NetworkSettings.Networks}}Network={{$k}} Gateway={{$v.Gateway}} IPAddress={{$v.IPAddress}} {{end}}' 2>/dev/null

            echo ""
            echo "=== 5. Test 容器能否解析 redis 主机名？ ==="
            docker exec nordhjem_medusa_test getent hosts redis 2>/dev/null || echo "❌ 无法解析 redis 主机名"
            docker exec nordhjem_medusa_test ping -c1 -W2 redis 2>/dev/null || echo "❌ 无法 ping redis"

            echo ""
            echo "=== 6. Staging 容器能否解析 redis？（对比）==="
            docker exec nordhjem_medusa_staging getent hosts redis 2>/dev/null || echo "无 getent"
            docker exec nordhjem_medusa_staging ping -c1 -W2 redis 2>/dev/null || echo "无法 ping"

            echo ""
            echo "============================================"
            echo "🔧 开始修复"
            echo "============================================"

            echo ""
            echo "=== Fix 1: 断开并重连 test 到 nordhjem_backend 网络 ==="
            docker network disconnect nordhjem_backend nordhjem_medusa_test 2>/dev/null || echo "已断开或未连接"
            docker network connect nordhjem_backend nordhjem_medusa_test 2>/dev/null || echo "连接失败"
            echo "重新连接完成"
            
            echo ""
            echo "=== Fix 2: 重启 test 容器（让它重新初始化网络）==="
            docker restart nordhjem_medusa_test
            echo "等待 60 秒让服务启动..."
            sleep 60

            echo ""
            echo "=== Fix 3: 验证 DNS 解析 ==="
            docker exec nordhjem_medusa_test getent hosts redis 2>/dev/null && echo "✅ DNS 解析成功" || echo "❌ DNS 仍然失败"

            echo ""
            echo "=== Fix 4: 健康检查 ==="
            for PORT in 9001 9002; do
              for ATTEMPT in 1 2 3 4 5 6; do
                STATUS=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:$PORT/health 2>/dev/null || echo "000")
                if [ "$STATUS" = "200" ]; then
                  echo "✅ Port $PORT: HTTP 200"
                  break
                fi
                echo "Port $PORT attempt $ATTEMPT: HTTP $STATUS, waiting 15s..."
                sleep 15
                if [ "$ATTEMPT" = "6" ]; then
                  echo "❌ Port $PORT: 仍然失败"
                  if [ "$PORT" = "9001" ]; then
                    echo "--- test 容器最新日志 ---"
                    docker logs nordhjem_medusa_test --tail 15 2>&1
                  fi
                fi
              done
            done

            echo ""
            echo "=== 最终状态 ==="
            docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" | grep -E "nordhjem_medusa|NAMES"
            
            echo ""
            echo "============================================"
            echo "🏁 完成"
            echo "============================================"
