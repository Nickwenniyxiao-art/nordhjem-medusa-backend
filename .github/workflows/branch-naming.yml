name: Branch Naming Convention

on:
  pull_request:
    branches: [develop]

jobs:
  branch-naming:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Skip for Dependabot
        if: github.actor == 'dependabot[bot]'
        run: echo "✅ Dependabot PR — branch naming check skipped"

      - name: Check branch name
        if: github.actor != 'dependabot[bot]'
        uses: deepakputhraya/action-branch-name@master
        with:
          regex: '^(feat|fix|hotfix|docs|chore|refactor|test|ci|codex)\/.+$'
          allowed_prefixes: "feat,fix,hotfix,docs,chore,refactor,test,ci,codex"
          ignore: "develop,staging,main"
          min_length: 5
          max_length: 80
