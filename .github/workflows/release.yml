name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.BOT_PAT }}

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install semantic-release
        run: |
          npm install --no-save \
            semantic-release@24 \
            @semantic-release/changelog@6 \
            @semantic-release/git@10 \
            @semantic-release/github@10 \
            @semantic-release/commit-analyzer@13 \
            @semantic-release/release-notes-generator@14

      - name: Temporarily allow direct push
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
        run: |
          gh api repos/${{ github.repository }}/branches/main/protection/enforce_admins -X DELETE || true

      - name: Pre-check existing tags
        run: |
          echo "=== Fetching all tags ==="
          git fetch --tags

          echo "=== Existing tags ==="
          git tag -l 'v*' | sort -V

          LATEST_TAG=$(git tag -l 'v*' | sort -V | tail -1)
          echo "Latest existing tag: $LATEST_TAG"

          # semantic-release will analyze commits since the latest tag
          # and determine the next version automatically.
          # If it tries to create an existing tag, there's a config issue.
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_ENV

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_PAT }}
        run: |
          # Ensure local tags are in sync with remote
          git fetch --tags --force
          echo "Tags synced. Running semantic-release..."
          npx semantic-release

      - name: Re-enable branch protection
        if: always()
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
        run: |
          gh api repos/${{ github.repository }}/branches/main/protection/enforce_admins -X POST || true
