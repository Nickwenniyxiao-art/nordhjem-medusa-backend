name: "CD — Production"

on:
  push:
    branches: [main]

concurrency:
  group: cd-production-backend
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  deploy-production:
    name: "🚀 Deploy → Production"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    steps:
      - name: Backup production database
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -e
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            BACKUP_DIR="/opt/nordhjem/backups/production"
            mkdir -p $BACKUP_DIR

            # 自动发现 PostgreSQL 容器
            POSTGRES_CONTAINER=""
            for candidate in nordhjem_postgres nordhjem_postgres_production nordhjem-postgres; do
              if docker ps -a --format '{{.Names}}' | grep -qx "$candidate"; then
                POSTGRES_CONTAINER="$candidate"
                break
              fi
            done

            if [ -z "$POSTGRES_CONTAINER" ]; then
              echo "⚠️ PostgreSQL container not found, skipping backup"
              exit 0
            fi

            # 从 production Medusa 容器获取数据库名
            MEDUSA_CONTAINER="nordhjem_medusa"
            DATABASE_URL=$(docker inspect "$MEDUSA_CONTAINER" --format '{{range .Config.Env}}{{println .}}{{end}}' 2>/dev/null | grep "DATABASE_URL=" | cut -d= -f2- || true)
            DB_NAME=$(echo "$DATABASE_URL" | sed -n 's|.*\/\([^?]*\).*|\1|p')
                        DB_USER=$(echo "$DATABASE_URL" | sed -n 's|.*://\([^:]*\):.*|\1|p')

            if [ -z "$DB_NAME" ]; then
              DB_NAME="nordhjem_production"
                            DB_USER="postgres"
              echo "⚠️ Could not detect DB name, using default: $DB_NAME"
            fi

            echo "=== Backing up production database ($DB_NAME) ==="
            docker exec $POSTGRES_CONTAINER pg_dump \
              -U "$DB_USER" \
              -d "$DB_NAME" \
              -F c \
              -f /tmp/backup_production_${TIMESTAMP}.dump

            docker cp $POSTGRES_CONTAINER:/tmp/backup_production_${TIMESTAMP}.dump \
              ${BACKUP_DIR}/backup_production_${TIMESTAMP}.dump

            docker exec $POSTGRES_CONTAINER rm -f /tmp/backup_production_${TIMESTAMP}.dump

            # 保留最近 10 个备份（production 保留更多）
            cd $BACKUP_DIR && ls -t *.dump 2>/dev/null | tail -n +11 | xargs -r rm

            echo "✅ Production backup complete: backup_production_${TIMESTAMP}.dump"

      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            CONTAINER="nordhjem_medusa"
            REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            IMAGE="ghcr.io/${REPO_LOWER}:latest"
            PORT=9000

            echo "=== Pulling latest image ==="
            docker pull $IMAGE

            echo "=== Saving env vars ==="
            ENV_FILE="/tmp/${CONTAINER}_env.txt"
            docker inspect $CONTAINER --format '{{range .Config.Env}}{{println .}}{{end}}' > $ENV_FILE 2>/dev/null || true

            echo "=== Running DB migration ==="
            if [ -f "$ENV_FILE" ] && [ -s "$ENV_FILE" ]; then
              docker run --rm --network nordhjem_backend --env-file $ENV_FILE $IMAGE npx medusa db:migrate || echo "Migration warning"
            fi

            echo "=== Replacing container ==="
            docker stop $CONTAINER 2>/dev/null || true
            docker rm $CONTAINER 2>/dev/null || true

            if [ -f "$ENV_FILE" ] && [ -s "$ENV_FILE" ]; then
              docker create --name $CONTAINER --publish $PORT:9000 --restart unless-stopped --env-file $ENV_FILE $IMAGE npx medusa start
            else
              echo "ERROR: No env file" && exit 1
            fi

            docker network connect nordhjem_backend $CONTAINER 2>/dev/null || true
            docker network connect nordhjem_frontend $CONTAINER 2>/dev/null || true
            docker start $CONTAINER
            rm -f $ENV_FILE
            echo "=== Deploy production complete ==="

      - name: Health check (production)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 3m
          script: |
            sleep 30
            for i in 1 2 3 4 5 6; do
              STATUS=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:9000/health 2>/dev/null || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "✅ Production health check passed"
                exit 0
              fi
              echo "Attempt $i: HTTP $STATUS, waiting 15s..."
              sleep 15
            done
            echo "❌ Health check failed"
            docker logs nordhjem_medusa --tail 30 2>&1 || true
            exit 1


      - name: Log deployment event
        if: success()
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.BOT_PAT }}
          script: |
            const now = new Date().toISOString().replace('T', ' ').substring(0, 19);
            const sha = context.sha.substring(0, 7);
            const actor = context.actor;
            const newLine = `| ${now} | production | ${sha} | ${actor} | cd-production |`;

            const defaultHeader = [
              '# 部署事件日志',
              '',
              '> 自动记录每次成功部署的时间、版本和环境。',
              '> 由 cd-staging.yml 和 cd-production.yml 自动更新。',
              '',
              '| 时间 (UTC) | 环境 | 版本 (SHA) | 触发者 | 工作流 |',
              '|------------|------|-----------|--------|--------|',
            ].join('\n');

            let content;
            let fileSha;
            try {
              const file = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: 'docs/DEPLOY-LOG.md',
                ref: 'develop'
              });
              content = Buffer.from(file.data.content, 'base64').toString('utf8');
              fileSha = file.data.sha;
            } catch (e) {
              content = `${defaultHeader}\n`;
              fileSha = undefined;
            }

            content = content.trimEnd() + '\n' + newLine + '\n';

            const lines = content.split('\n');
            const separatorIndex = lines.findIndex((line) => line.startsWith('|------------'));
            const headerLines = separatorIndex >= 0 ? lines.slice(0, separatorIndex + 1) : defaultHeader.split('\n');
            const dataLines = lines.slice(separatorIndex + 1).filter((line) => line.startsWith('|'));
            const trimmedData = dataLines.slice(-100);
            content = headerLines.join('\n') + '\n' + trimmedData.join('\n') + '\n';

            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'docs/DEPLOY-LOG.md',
              message: 'docs: log production deployment [skip ci]',
              content: Buffer.from(content).toString('base64'),
              branch: 'develop',
              ...(fileSha ? { sha: fileSha } : {})
            });

            console.log(`✅ Logged production deployment: ${sha} by ${actor}`);

  smoke-test-production:
    name: "💨 Smoke Test → Production"
    needs: deploy-production
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Wait for service to stabilize
        run: sleep 30

      - name: Health check
        run: |
          PROD_URL="${{ secrets.PRODUCTION_URL || 'https://api.nordhjem.com' }}"

          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$PROD_URL/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed (attempt $i)"
              exit 0
            fi
            echo "⏳ Attempt $i: status=$STATUS, retrying in 10s..."
            sleep 10
          done

          echo "❌ Production health check failed after 5 attempts"
          exit 1

      - name: Basic API smoke test
        run: |
          PROD_URL="${{ secrets.PRODUCTION_URL || 'https://api.nordhjem.com' }}"

          echo "Testing /store/products..."
          RESPONSE=$(curl -s -w "\n%{http_code}" "$PROD_URL/store/products?limit=1")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ /store/products returned $HTTP_CODE"
            exit 1
          fi

          echo "✅ All production smoke tests passed"

  e2e-production:
    name: "🧪 E2E → Production"
    needs: deploy-production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Run production verification
        run: |
          echo "=== Production Environment Verification ==="

          echo "--- Health check ---"
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" http://${{ secrets.DEPLOY_HOST }}:9000/health || echo "000")
          echo "Health: HTTP $STATUS"
          [ "$STATUS" = "200" ] || { echo "❌ Health check failed"; exit 1; }

          echo "--- Store API check ---"
          if [ -n "${{ secrets.PRODUCTION_PUBLISHABLE_KEY }}" ]; then
            RESP=$(curl -sf "http://${{ secrets.DEPLOY_HOST }}:9000/store/products?limit=1" \
              -H "x-publishable-api-key: ${{ secrets.PRODUCTION_PUBLISHABLE_KEY }}" || echo "FAILED")
            if echo "$RESP" | grep -q '"products"'; then
              echo "✅ Store API returned products"
            else
              echo "⚠️ Store API check skipped (key may not be configured)"
            fi
          else
            echo "⚠️ Store API check skipped (key may not be configured)"
          fi

          echo "--- Admin API check ---"
          ADMIN=$(curl -sf -o /dev/null -w "%{http_code}" "http://${{ secrets.DEPLOY_HOST }}:9000/admin" || echo "000")
          echo "Admin: HTTP $ADMIN"

          echo "✅ Production verification complete"
