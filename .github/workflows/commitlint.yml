name: Commit Message Lint

on:
  pull_request:
    branches: [develop]

permissions:
  contents: read
  pull-requests: read

jobs:
  commitlint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Lint commit messages
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.mjs
          failOnWarnings: false
          failOnErrors: true
          helpURL: "https://www.conventionalcommits.org/zh-hans/"
