name: Scope Validation

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]
    branches: [develop]

permissions:
  contents: read
  pull-requests: read

jobs:
  check-scope:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v6
      - name: Validate changed modules are in FEATURE-LIST
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const prLabels = context.payload.pull_request.labels.map(l => l.name);

            // Skip for infra/docs-only PRs
            if (prLabels.includes('no-issue') || prLabels.includes('egp-bootstrap') || prLabels.includes('hotfix')) {
              console.log('✅ Skipping scope check for exempt PR');
              return;
            }

            // Read FEATURE-LIST if exists
            let featureList = '';
            try {
              featureList = fs.readFileSync('docs/FEATURE-LIST.md', 'utf8');
            } catch(e) {
              core.warning('docs/FEATURE-LIST.md not found — scope check skipped');
              return;
            }

            // Get changed files
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100
            });

            // Extract module names from src/ changes (Medusa v2 module structure)
            const changedModules = new Set();
            for (const file of files) {
              const match = file.filename.match(/^src\/(?:modules?|workflows?|api|subscribers|jobs|links)\/([^\/]+)/);
              if (match) changedModules.add(match[1].toLowerCase());
            }

            if (changedModules.size === 0) {
              console.log('✅ No module-level changes detected');
              return;
            }

            // Check each module against FEATURE-LIST
            const missing = [];
            for (const mod of changedModules) {
              if (!featureList.toLowerCase().includes(mod)) {
                missing.push(mod);
              }
            }

            if (missing.length > 0) {
              core.setFailed(
                `❌ 范围校验失败：以下模块不在 docs/FEATURE-LIST.md 中：\n${missing.map(m => `  - ${m}`).join('\n')}\n\n` +
                `请先更新 FEATURE-LIST.md 并走变更管理流程，再提交代码。\n` +
                `如果这是基础设施变更，请添加 no-issue 标签。`
              );
            } else {
              console.log(`✅ 范围校验通过：所有模块均在 FEATURE-LIST 中`);
            }
