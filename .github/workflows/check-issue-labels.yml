name: Check Issue Labels

on:
  pull_request:
    types: [opened, edited, reopened, synchronize, labeled, unlabeled]
    branches: [develop]

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  check-issue-labels:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Check linked issue has required labels
        uses: actions/github-script@v8
        with:
          script: |
            const prBody = context.payload.pull_request.body || '';
            const prLabels = context.payload.pull_request.labels.map(l => l.name);

            // Skip for no-issue or hotfix PRs
            if (prLabels.includes('no-issue') || prLabels.includes('hotfix')) {
              console.log('Skipping: PR has no-issue or hotfix label');
              return;
            }
            // Codex branch exemption
            const headRef = context.payload.pull_request.head.ref;
            if (headRef.startsWith('codex/')) {
              console.log('Skipping: PR from codex/ branch (AI-generated)');
              return;
            }

            // Extract linked issue numbers
            const issuePattern = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi;
            const matches = [...prBody.matchAll(issuePattern)];
            if (matches.length === 0) {
              // check-linked-issue will catch this, skip here
              console.log('No linked issue found, skipping label check (check-linked-issue will catch this)');
              return;
            }

            const requiredLabelPrefixes = ['type:'];

            for (const match of matches) {
              const issueNumber = parseInt(match[1]);
              const issue = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber
              });

              const issueLabels = issue.data.labels.map(l => l.name);
              console.log(`Issue #${issueNumber} labels: ${issueLabels.join(', ')}`);

              // Check required label prefixes
              for (const prefix of requiredLabelPrefixes) {
                const hasLabel = issueLabels.some(l => l.startsWith(prefix));
                if (!hasLabel) {
                  core.setFailed(
                    `Issue #${issueNumber} is missing a "${prefix}" label.\n` +
                    `Required label prefixes: ${requiredLabelPrefixes.join(', ')}\n` +
                    `Current labels: ${issueLabels.join(', ') || '(none)'}`
                  );
                  return;
                }
              }

              console.log(`Issue #${issueNumber} has all required labels ✅`);
            }

            console.log('All linked issues have required labels');
