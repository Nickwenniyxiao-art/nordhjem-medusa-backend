name: DORA Dashboard

on:
  schedule:
    - cron: '0 1 * * 1' # Every Monday 01:00 UTC (after SLO check)
  workflow_dispatch:

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  dashboard:
    name: Generate DORA Dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute DORA metrics
        uses: actions/github-script@v7
        with:
          script: |
            const now = new Date();
            const thirtyDaysAgo = new Date(now - 30 * 24 * 60 * 60 * 1000);

            // Deployment Frequency — PRs merged to main in last 30 days
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
              base: 'main',
              per_page: 100,
            });
            const merged = prs.data.filter(pr => pr.merged_at && new Date(pr.merged_at) > thirtyDaysAgo);
            const deployFreq = (merged.length / 30).toFixed(2);

            // Change Failure Rate — PRs with 'type: hotfix' label
            const hotfixes = merged.filter(pr => pr.labels.some(l => l.name === 'type: hotfix'));
            const cfr = merged.length > 0 ? ((hotfixes.length / merged.length) * 100).toFixed(1) : '0.0';

            // Lead Time — avg time from PR open to merge
            const leadTimes = merged
              .filter(pr => pr.merged_at && pr.created_at)
              .map(pr => (new Date(pr.merged_at).getTime() - new Date(pr.created_at).getTime()) / 3600000);
            const avgLeadTime = leadTimes.length > 0
              ? (leadTimes.reduce((a, b) => a + b, 0) / leadTimes.length).toFixed(1)
              : 'N/A';

            // Issues — open P1 bugs
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'priority: P1',
              per_page: 50,
            });
            const p1Count = issues.data.filter(i => !i.pull_request).length;
            const date = now.toISOString().split('T')[0];

            // Build dashboard
            let report = `# DORA Dashboard — ${date}\n\n`;
            report += `> 30-day rolling window | Auto-generated by GitHub Actions\n\n`;
            report += `## Four Key Metrics\n\n`;
            report += `| Metric | Value | DORA Elite Target |\n`;
            report += `|--------|-------|------------------|\n`;
            report += `| Deployment Frequency | ${deployFreq}/day | > 1/day |\n`;
            report += `| ⏱️ Lead Time for Changes | ${avgLeadTime}h | < 24h |\n`;
            report += `| Change Failure Rate | ${cfr}% | < 5% |\n`;
            report += `| Open P1 Incidents | ${p1Count} | 0 |\n`;
            report += `\n`;
            report += `## Deployments (last 30 days)\n\n`;
            report += `- Total merges to main: **${merged.length}**\n`;
            report += `- Hotfix/rollback PRs: **${hotfixes.length}**\n`;
            report += `\n`;
            report += `## Engineering Excellence Maturity\n\n`;
            report += `| Pillar | Score |\n`;
            report += `|--------|-------|\n`;
            report += `| CI/CD Pipeline | L3 |\n`;
            report += `| Security & Governance | L3+ |\n`;
            report += `| Incident Management | L3 (Sentry) |\n`;
            report += `| Quality | L2+ |\n`;
            report += `| Dev Environment | L3 (DevContainer) |\n`;
            report += `\n`;
            report += `ROADMAP Ref: INFRA\n`;

            core.summary.addRaw(report);
            await core.summary.write();
            console.log(report);
