name: PR Title Convention

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]
    branches: [develop]

jobs:
  pr-title:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Skip title check for codex branches
        if: startsWith(github.event.pull_request.head.ref, 'codex/')
        run: "echo 'Skipping: PR from codex/ branch (AI-generated)'"

      - name: Check PR title
        if: ${{ !startsWith(github.event.pull_request.head.ref, 'codex/') }}
        uses: deepakputhraya/action-pr-title@master
        with:
          regex: '^(feat|fix|hotfix|docs|chore|refactor|test|ci)(\(.+\))?\!?\:\s.+'
          allowed_prefixes: "feat,fix,hotfix,docs,chore,refactor,test,ci"
          prefix_case_sensitive: true
          min_length: 10
          max_length: 120
