name: Check Linked Issue

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]
    branches: [develop]

permissions:
  contents: read
  pull-requests: read

jobs:
  check-linked-issue:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Check PR body has linked issue
        uses: actions/github-script@v8
        with:
          script: |
            const prBody = context.payload.pull_request.body || '';
            const prLabels = context.payload.pull_request.labels.map(l => l.name);
            if (prLabels.includes('no-issue') || prLabels.includes('hotfix')) {
              console.log('Skipping: PR has no-issue or hotfix label');
              return;
            }
            // Codex branch exemption
            const headRef = context.payload.pull_request.head.ref;
            if (headRef.startsWith('codex/')) {
              console.log('Skipping: PR from codex/ branch (AI-generated)');
              return;
            }
            const issuePattern = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi;
            const matches = [...prBody.matchAll(issuePattern)];
            if (matches.length === 0) {
              core.setFailed(
                'PR description does not contain a linked Issue.\n' +
                'Please add "Closes #<issue_number>" to the PR description.'
              );
              return;
            }
            for (const match of matches) {
              console.log(`Found linked Issue #${match[1]}`);
            }
            console.log(`All good: ${matches.length} linked issue(s) found`);
