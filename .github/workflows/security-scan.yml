name: Security Scan

on:
  pull_request:
    branches: [develop]
  push:
    branches: [develop]
  schedule:
    - cron: '0 6 * * 1' # 周一 — dependency audit
    - cron: '0 6 * * 3' # 周三 — trivy container scan
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  packages: read

jobs:
  semgrep:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v6

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config "p/javascript" \
            --config "p/nodejs" \
            --config "p/typescript" \
            --exclude "node_modules" \
            --exclude "dist" \
            --exclude ".next" \
            --exclude "build" \
            --exclude "package-lock.json" \
            --error \
            --sarif \
            --output semgrep-results.sarif \
            .
        continue-on-error: true

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep-results.sarif
        continue-on-error: true

      - name: Check for errors
        run: |
          semgrep scan \
            --config "p/javascript" \
            --config "p/nodejs" \
            --config "p/typescript" \
            --exclude "node_modules" \
            --exclude "dist" \
            --exclude ".next" \
            --exclude "build" \
            --exclude "package-lock.json" \
            --error \
            --severity ERROR \
            .

  gitleaks:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-audit:
    if: github.event_name == 'pull_request' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - run: npm ci

      - name: Run npm audit
        run: |
          echo "## 依赖安全审计报告" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # 运行 audit，捕获输出
          npm audit --audit-level=high 2>&1 | tee audit-output.txt || true

          echo '```' >> $GITHUB_STEP_SUMMARY
          cat audit-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          # 严格检查：high 和 critical 级别
          npm audit --audit-level=high

  trivy-container-scan:
    if: (github.event_name == 'schedule' && github.event.schedule == '0 6 * * 3') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Scan staging image from GHCR
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/nickwenniyxiao-art/nordhjem-medusa-backend:staging'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
          output: 'trivy-staging.txt'
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan production image from GHCR
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/nickwenniyxiao-art/nordhjem-medusa-backend:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
          output: 'trivy-production.txt'
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trivy-results
          path: |
            trivy-staging.txt
            trivy-production.txt
