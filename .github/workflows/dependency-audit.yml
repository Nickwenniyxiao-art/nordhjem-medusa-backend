name: Dependency Audit

on:
  pull_request:
    branches: [develop]
  schedule:
    - cron: '0 6 * * 1' # 每周一 UTC 6:00
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Skip for no-issue / infra PRs
        uses: actions/github-script@v7
        with:
          script: |
            const prLabels = context.payload.pull_request?.labels?.map(l => l.name) || [];
            if (prLabels.includes('no-issue') || prLabels.includes('hotfix') || prLabels.includes('type: infra')) {
              core.exportVariable('SKIP_AUDIT', 'true');
              console.log('✅ Skipping dependency audit for infra/no-issue PR');
            }

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
        if: env.SKIP_AUDIT != 'true'

      - name: Run npm audit
        if: env.SKIP_AUDIT != 'true'
        run: |
          echo "## 依赖安全审计报告" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # 运行 audit，捕获输出
          npm audit --audit-level=high 2>&1 | tee audit-output.txt || true

          echo '```' >> $GITHUB_STEP_SUMMARY
          cat audit-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          # 严格检查：high 和 critical 级别
          npm audit --audit-level=high
