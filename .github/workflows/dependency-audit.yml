name: Dependency Audit

on:
  pull_request:
    branches: [develop]
  schedule:
    - cron: '0 6 * * 1' # 每周一 UTC 6:00
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Skip for no-issue / infra PRs
        uses: actions/github-script@v7
        with:
          script: |
            const prLabels = context.payload.pull_request?.labels?.map(l => l.name) || [];
            if (prLabels.includes('no-issue') || prLabels.includes('hotfix') || prLabels.includes('type: infra')) {
              core.exportVariable('SKIP_AUDIT', 'true');
              console.log('✅ Skipping dependency audit for infra/no-issue PR');
            }

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci --legacy-peer-deps --maxsockets=2 --network-timeout=120000
        if: env.SKIP_AUDIT != 'true'

      - name: Run npm audit
        if: env.SKIP_AUDIT != 'true'
        run: |
          echo "## 依赖安全审计报告" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Ignored advisories (see docs/CI-FAILURES-LOG.md for rationale):
          #   GHSA-67mh-4wv8-2f99 — esbuild dev-server CVE; unfixable without vite@8 (breaking)
          #   GHSA-8gc5-j5rx-235r — fast-xml-parser; tracked for lockfile update in follow-up task
          IGNORE="--ignore-advisories GHSA-67mh-4wv8-2f99,GHSA-8gc5-j5rx-235r"

          # 运行 audit，捕获输出
          npm audit --audit-level=high $IGNORE 2>&1 | tee audit-output.txt || true

          echo '```' >> $GITHUB_STEP_SUMMARY
          cat audit-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          # 严格检查：high 和 critical 级别（已排除无法修复的已知 advisory）
          npm audit --audit-level=high $IGNORE
