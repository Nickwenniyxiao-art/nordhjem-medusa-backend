name: Codex Auto-Fix on Failure

on:
  workflow_run:
    # CD Pipeline 失败时自动触发 Codex 修复
    workflows: ["CD Pipeline"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-fix:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      FAILED_WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
      FAILED_RUN_URL: ${{ github.event.workflow_run.html_url }}
      FAILED_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
      FAILED_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}

    steps:
      - name: Check OpenAI API Key
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "❌ OPENAI_API_KEY secret is not set." >&2
            exit 1
          fi

      - name: Checkout failing ref
        uses: actions/checkout@v4
        with:
          ref: ${{ env.FAILED_HEAD_SHA }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run Codex to fix the issue
        uses: openai/codex-action@main
        id: codex
        with:
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            你正在一个 Medusa.js v2 电商后端项目中工作。
            这个项目的 CD Pipeline 刚刚失败了。
            失败的 workflow: ${{ env.FAILED_WORKFLOW_NAME }}
            失败的 run: ${{ env.FAILED_RUN_URL }}

            请阅读代码库，找到导致 pipeline 失败的最小改动，只修复那个问题。
            不要重构无关代码，保持修改尽量小和精准。

            项目结构:
            - 后端: Medusa.js v2, TypeScript
            - 数据库: PostgreSQL 15
            - 部署: Docker 容器
            - CI/CD: GitHub Actions
          codex_args: '["--config","sandbox_mode=\"workspace-write\""]'

      - name: Create pull request with fixes
        if: success()
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "fix(codex): auto-fix pipeline failure"
          branch: codex/auto-fix-${{ github.event.workflow_run.run_id }}
          base: ${{ env.FAILED_HEAD_BRANCH }}
          title: "🤖 Codex Auto-Fix: ${{ env.FAILED_WORKFLOW_NAME }} pipeline failure"
          body: |
            ## Codex 自动修复

            Codex 检测到 CD Pipeline 失败，自动生成了这个修复 PR。

            - **失败的 Workflow**: `${{ env.FAILED_WORKFLOW_NAME }}`
            - **失败的 Run**: ${{ env.FAILED_RUN_URL }}
            - **分支**: `${{ env.FAILED_HEAD_BRANCH }}`

            ---
            ⚠️ 请 Review 后再 Merge。Merge 后 CD Pipeline 会自动重新运行。
