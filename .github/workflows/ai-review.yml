  #       env:
  #         ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  #       run: echo "Reviewer 2 placeholder"

  # ── Reviewer 3: [TEMPLATE] ──────────────────────────────────
  # reviewer-3-architecture:
  #   needs: extract-diff
  #   if: needs.extract-diff.outputs.has_code_changes == 'true'
  #   runs-on: ubuntu-latest
  #   timeout-minutes: 10
  #   steps:
  #     - name: AI Review — Architecture (Perplexity)
  #       env:
  #         PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
  #       run: echo "Reviewer 3 placeholder"

  # ── Summary Gate ─────────────────────────────────────────────
  ai-review-gate:
    needs: [reviewer-1-quality]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all reviewers passed
        run: |
          echo "=== AI Review Summary ==="
          echo "Reviewer 1 (Quality): ${{ needs.reviewer-1-quality.result }}"

          if [ "${{ needs.reviewer-1-quality.result }}" = "failure" ]; then
            echo "❌ AI reviewer flagged blocking issues."
            exit 1
          fi

          echo "✅ All AI reviewers passed."

      - name: Post AI review result
        if: needs.reviewer-1-quality.result == 'success' || needs.reviewer-1-quality.result == 'skipped'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.BOT_PAT }}
          script: |
            const pr = context.payload.pull_request;
            console.log(`✅ AI Review passed for PR #${pr.number}, posting comment.`);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: '✅ AI Code Review passed — all reviewers approved.\n\nAutomated review by AI Code Review bot.'
            });
