name: CD

on:
  push:
    branches: [develop, staging, main]

concurrency:
  group: deploy-backend-${{ github.ref_name }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: nickwenniyxiao-art/nordhjem-medusa-backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.ref_name }}" = "develop" ]; then
            echo "target=test" >> $GITHUB_OUTPUT
            echo "container=nordhjem_medusa_test" >> $GITHUB_OUTPUT
            echo "port=9001" >> $GITHUB_OUTPUT
            echo "tag=develop" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "staging" ]; then
            echo "target=staging" >> $GITHUB_OUTPUT
            echo "container=nordhjem_medusa_staging" >> $GITHUB_OUTPUT
            echo "port=9002" >> $GITHUB_OUTPUT
            echo "tag=staging" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "main" ]; then
            echo "target=production" >> $GITHUB_OUTPUT
            echo "container=nordhjem_medusa" >> $GITHUB_OUTPUT
            echo "port=9000" >> $GITHUB_OUTPUT
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Wait for Docker image to be pushed
        run: sleep 60

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          command_timeout: 10m
          script: |
            set -e
            CONTAINER="${{ steps.env.outputs.container }}"
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.env.outputs.tag }}"
            PORT=${{ steps.env.outputs.port }}
            
            echo "=== Pulling latest image (${{ steps.env.outputs.tag }}) ==="
            docker pull $IMAGE
            
            echo "=== Running DB migration ==="
            ENV_ARGS=$(docker inspect $CONTAINER --format '{{range .Config.Env}}-e "{{.}}" {{end}}' 2>/dev/null || echo "")
            if [ -n "$ENV_ARGS" ]; then
              eval docker run --rm --network nordhjem_backend $ENV_ARGS $IMAGE npx medusa db:migrate || echo "Migration completed with warnings"
            fi
            
            echo "=== Saving env vars ==="
            ENV_FILE="/tmp/${CONTAINER}_env.txt"
            docker inspect $CONTAINER --format '{{range .Config.Env}}{{println .}}{{end}}' > $ENV_FILE 2>/dev/null || true
            
            echo "=== Stop and remove old container ==="
            docker stop $CONTAINER 2>/dev/null || true
            docker rm $CONTAINER 2>/dev/null || true
            
            echo "=== Recreate container ==="
            ENV_DOCKER_ARGS=""
            if [ -f "$ENV_FILE" ] && [ -s "$ENV_FILE" ]; then
              while IFS= read -r line; do
                [ -n "$line" ] && ENV_DOCKER_ARGS="$ENV_DOCKER_ARGS -e \"$line\""
              done < "$ENV_FILE"
            fi
            
            eval docker create --name $CONTAINER --publish $PORT:9000 \
              $ENV_DOCKER_ARGS \
              --restart unless-stopped \
              $IMAGE npx medusa start
            
            docker network connect nordhjem_backend $CONTAINER
            docker network connect nordhjem_frontend $CONTAINER 2>/dev/null || true
            docker start $CONTAINER
            
            rm -f $ENV_FILE
            echo "=== Deploy complete: ${{ steps.env.outputs.target }} ==="

      - name: Health check
        run: |
          for i in 1 2 3 4; do
            sleep 15
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" http://${{ secrets.DEPLOY_HOST }}:${{ steps.env.outputs.port }}/health || true)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS, waiting..."
          done
          echo "Health check failed"
          exit 1
