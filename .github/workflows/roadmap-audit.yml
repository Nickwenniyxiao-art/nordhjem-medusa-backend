name: ROADMAP Audit

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read
  issues: read
  pull-requests: write

jobs:
  roadmap-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ROADMAP coverage audit
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // ── 1. Parse ROADMAP.md ──
            let roadmapContent = '';
            try {
              roadmapContent = fs.readFileSync('docs/ROADMAP.md', 'utf8');
            } catch (e) {
              console.log('Cannot read docs/ROADMAP.md, skipping audit');
              return;
            }

            const idPattern = /\|\s*(R-P\d+-\d+)\s*\|/g;
            const roadmapIds = new Map(); // id -> task name
            let match;
            while ((match = idPattern.exec(roadmapContent)) !== null) {
              // Extract task name from same row: | R-P0-01 | task name | ...
              const lineStart = roadmapContent.lastIndexOf('\n', match.index) + 1;
              const lineEnd = roadmapContent.indexOf('\n', match.index);
              const line = roadmapContent.substring(lineStart, lineEnd === -1 ? undefined : lineEnd);
              const cols = line.split('|').map(c => c.trim()).filter(c => c);
              const taskName = cols.length > 1 ? cols[1] : 'Unknown';
              roadmapIds.set(match[1], taskName);
            }

            console.log(`📊 ROADMAP contains ${roadmapIds.size} objectives`);

            // ── 2. Fetch all open issues from BOTH repos ──
            const repos = [
              { owner: 'Nickwenniyxiao-art', repo: 'nordhjem-medusa-backend' },
              { owner: 'Nickwenniyxiao-art', repo: 'nextjs-starter-medusa' }
            ];

            const allIssues = [];
            for (const r of repos) {
              let page = 1;
              while (true) {
                const { data: issues } = await github.rest.issues.listForRepo({
                  owner: r.owner,
                  repo: r.repo,
                  state: 'open',
                  per_page: 100,
                  page: page
                });
                const realIssues = issues.filter(i => !i.pull_request);
                allIssues.push(...realIssues.map(i => ({ ...i, source_repo: r.repo })));
                if (issues.length < 100) break;
                page++;
              }
            }

            console.log(`📊 Found ${allIssues.length} open issues across ${repos.length} repos`);

            // ── 3. Extract ROADMAP Refs from issues ──
            const refPattern = /###\s*ROADMAP Ref\s*\n+\s*(.+)/i;
            const issuesByRef = new Map();    // ref -> [issues]
            const noRefIssues = [];           // issues without ROADMAP Ref
            const hotfixIssues = [];          // HOTFIX/INFRA exempt issues
            const invalidRefIssues = [];      // issues with invalid ref

            for (const issue of allIssues) {
              const body = issue.body || '';
              const refMatch = body.match(refPattern);

              if (!refMatch) {
                noRefIssues.push(issue);
                continue;
              }

              const ref = refMatch[1].trim().toUpperCase();

              if (ref === 'HOTFIX' || ref === 'INFRA') {
                hotfixIssues.push({ issue, ref });
                continue;
              }

              if (!roadmapIds.has(ref) && !/^R-P\d+-\d+$/.test(ref)) {
                invalidRefIssues.push({ issue, ref });
                continue;
              }

              if (!issuesByRef.has(ref)) issuesByRef.set(ref, []);
              issuesByRef.get(ref).push(issue);
            }

            // ── 4. Calculate coverage ──
            const coveredIds = new Set();
            for (const ref of issuesByRef.keys()) {
              if (roadmapIds.has(ref)) coveredIds.add(ref);
            }

            const uncoveredIds = [...roadmapIds.entries()]
              .filter(([id]) => !coveredIds.has(id))
              // Skip completed items (they appear in ROADMAP with ✅)
              .filter(([id]) => {
                const line = roadmapContent.split('\n').find(l => l.includes(`| ${id} |`));
                return line && !line.includes('✅');
              });

            const coveragePercent = roadmapIds.size > 0
              ? Math.round((coveredIds.size / roadmapIds.size) * 100)
              : 0;

            // ── 5. Build report ──
            let report = `## 📊 ROADMAP 追溯审计报告\n\n`;
            report += `| 指标 | 数值 |\n|------|------|\n`;
            report += `| ROADMAP 目标总数 | ${roadmapIds.size} |\n`;
            report += `| 有 Issue 覆盖的目标 | ${coveredIds.size} |\n`;
            report += `| 覆盖率 | ${coveragePercent}% |\n`;
            report += `| Open Issues 总数 | ${allIssues.length} |\n`;
            report += `| 无 ROADMAP Ref 的 Issue | ${noRefIssues.length} |\n`;
            report += `| HOTFIX/INFRA 豁免 | ${hotfixIssues.length} |\n\n`;

            if (uncoveredIds.length > 0) {
              report += `### ⏳ 未启动的 ROADMAP 目标（无 open Issue）\n\n`;
              report += `| ID | 目标 |\n|----|------|\n`;
              for (const [id, name] of uncoveredIds) {
                report += `| ${id} | ${name} |\n`;
              }
              report += `\n`;
            }

            if (noRefIssues.length > 0) {
              report += `### ⚠️ 无 ROADMAP Ref 的 Issue（可能偏离）\n\n`;
              report += `| Issue | 标题 | 仓库 |\n|-------|------|------|\n`;
              for (const issue of noRefIssues.slice(0, 20)) {
                report += `| #${issue.number} | ${issue.title} | ${issue.source_repo} |\n`;
              }
              if (noRefIssues.length > 20) {
                report += `| ... | 还有 ${noRefIssues.length - 20} 个 | |\n`;
              }
              report += `\n`;
            }

            if (hotfixIssues.length > 0) {
              report += `### 🔥 HOTFIX/INFRA 豁免（需 Owner 复核）\n\n`;
              report += `| Issue | 标题 | 类型 |\n|-------|------|------|\n`;
              for (const { issue, ref } of hotfixIssues) {
                report += `| #${issue.number} | ${issue.title} | ${ref} |\n`;
              }
              report += `\n`;
            }

            if (invalidRefIssues.length > 0) {
              report += `### ❌ 无效 ROADMAP Ref\n\n`;
              report += `| Issue | 标题 | Ref |\n|-------|------|-----|\n`;
              for (const { issue, ref } of invalidRefIssues) {
                report += `| #${issue.number} | ${issue.title} | ${ref} |\n`;
              }
              report += `\n`;
            }

            report += `---\n*自动生成 by roadmap-audit.yml*`;

            // ── 6. Post as PR comment (if triggered by PR) ──
            if (context.payload.pull_request) {
              // Find and update existing audit comment, or create new one
              const marker = '## 📊 ROADMAP 追溯审计报告';
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                per_page: 100
              });

              const existing = comments.find(c =>
                c.user.type === 'Bot' && c.body.includes(marker)
              );

              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body: report
                });
                console.log('Updated existing audit comment');
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.pull_request.number,
                  body: report
                });
                console.log('Posted new audit comment');
              }
            }

            console.log('\n' + report);
            console.log('\n✅ Audit complete');
