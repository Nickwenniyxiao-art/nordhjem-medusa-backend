name: DORA Metrics

on:
  schedule:
    - cron: '0 9 * * 1' # 每周一 UTC 9:00
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: read

jobs:
  collect-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Collect DORA Metrics
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.CTO_PAT }}
          script: |
            const now = new Date();
            const sevenDaysAgo = new Date(now - 7 * 24 * 60 * 60 * 1000);
            const thirtyDaysAgo = new Date(now - 30 * 24 * 60 * 60 * 1000);

            // Ensure label exists
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'dora-report',
                color: '0e8a16',
                description: 'Weekly DORA metrics report'
              });
            } catch (e) {
              // Label already exists, ignore
            }

            // --- 1. Deployment Frequency ---
            // Count pushes to main in last 7 and 30 days
            const commits7d = await github.rest.repos.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: 'main',
              since: sevenDaysAgo.toISOString(),
              per_page: 100
            });

            const commits30d = await github.rest.repos.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: 'main',
              since: thirtyDaysAgo.toISOString(),
              per_page: 100
            });

            const deployFreq7d = commits7d.data.length;
            const deployFreq30d = commits30d.data.length;
            const deployFreqDaily = (deployFreq30d / 30).toFixed(1);

            // --- 2. Lead Time for Changes ---
            // Calculate average PR merge time (created → merged) for last 30 days
            const mergedPRs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
              sort: 'updated',
              direction: 'desc',
              per_page: 50
            });

            const recentMerged = mergedPRs.data.filter(pr =>
              pr.merged_at && new Date(pr.merged_at) > thirtyDaysAgo
            );

            let totalLeadTime = 0;
            let leadTimeCount = 0;
            for (const pr of recentMerged) {
              const created = new Date(pr.created_at);
              const merged = new Date(pr.merged_at);
              const hours = (merged - created) / (1000 * 60 * 60);
              totalLeadTime += hours;
              leadTimeCount++;
            }
            const avgLeadTimeHours = leadTimeCount > 0 ? (totalLeadTime / leadTimeCount).toFixed(1) : 'N/A';

            // --- 3. Change Failure Rate ---
            // Count issues/PRs with hotfix label vs total merged PRs
            const hotfixIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'type: hotfix',
              state: 'all',
              since: thirtyDaysAgo.toISOString(),
              per_page: 100
            });
            const cfr = leadTimeCount > 0
              ? ((hotfixIssues.data.length / leadTimeCount) * 100).toFixed(1)
              : '0';

            // --- 4. Time to Restore Service ---
            // Average time from incident issue creation to close
            const incidents = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'type: incident',
              state: 'closed',
              since: thirtyDaysAgo.toISOString(),
              per_page: 100
            });

            let totalRestoreTime = 0;
            let restoreCount = 0;
            for (const issue of incidents.data) {
              if (issue.closed_at) {
                const created = new Date(issue.created_at);
                const closed = new Date(issue.closed_at);
                const hours = (closed - created) / (1000 * 60 * 60);
                totalRestoreTime += hours;
                restoreCount++;
              }
            }
            const avgRestoreHours = restoreCount > 0 ? (totalRestoreTime / restoreCount).toFixed(1) : 'N/A';

            // --- 5. CI Green Rate ---
            const runs7d = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              created: `>${sevenDaysAgo.toISOString().split('T')[0]}`,
              per_page: 100
            });

            const ciRuns = runs7d.data.workflow_runs.filter(r => r.name === 'CI');
            const successRuns = ciRuns.filter(r => r.conclusion === 'success');
            const ciGreenRate = ciRuns.length > 0
              ? ((successRuns.length / ciRuns.length) * 100).toFixed(1)
              : 'N/A';

            // --- 6. Security Findings ---
            const securityIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'security',
              state: 'open',
              per_page: 100
            });
            const openSecurityFindings = securityIssues.data.length;

            // --- 7. Test Coverage Trend ---
            // Read from latest coverage artifact (if available)
            // TODO: A1/A2 完成后，从 coverage-summary.json artifact 中提取实际百分比
            let coveragePercent = 'N/A';
            try {
              const artifacts = await github.rest.actions.listArtifactsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 10,
                name: 'coverage-report'
              });
              if (artifacts.data.artifacts.length > 0) {
                coveragePercent = 'See CI artifacts';
              }
            } catch (e) {
              coveragePercent = 'N/A';
            }

            const ciGreenTrend = ciGreenRate === 'N/A'
              ? '⚪ 数据不足'
              : Number(ciGreenRate) >= 90
                ? '🟢 健康'
                : Number(ciGreenRate) >= 70
                  ? '🟡 需关注'
                  : '🔴 需改进';

            const securityTrend = openSecurityFindings === 0
              ? '🟢 无'
              : openSecurityFindings <= 3
                ? '🟡 少量'
                : '🔴 需处理';

            const qualitySection = `
            ### 质量趋势指标

            | 指标 | 值 | 趋势 |
            |------|-----|------|
            | **CI 绿率** | ${ciGreenRate === 'N/A' ? 'N/A' : `${ciGreenRate}%`} | ${ciGreenTrend} |
            | **开放安全 Issue** | ${openSecurityFindings} 个 | ${securityTrend} |
            | **测试覆盖率** | ${coveragePercent} | — |
            `;

            // --- Output as Summary ---
            const baseSummary = `# DORA Metrics Report

            | Metric | Value | Period | DORA Level |
            |--------|-------|--------|------------|
            | **部署频率 (Deployment Frequency)** | ${deployFreq7d} deploys/week, ${deployFreqDaily}/day | 7d / 30d | ${deployFreqDaily >= 1 ? '🟢 Elite' : deployFreqDaily >= 0.14 ? '🟡 High' : '🔴 Low'} |
            | **变更前置时间 (Lead Time)** | ${avgLeadTimeHours} hours avg | 30d | ${avgLeadTimeHours !== 'N/A' && avgLeadTimeHours < 24 ? '🟢 Elite' : avgLeadTimeHours < 168 ? '🟡 High' : '🔴 Low'} |
            | **变更失败率 (Change Failure Rate)** | ${cfr}% | 30d | ${cfr < 5 ? '🟢 Elite' : cfr < 15 ? '🟡 High' : '🔴 Low'} |
            | **服务恢复时间 (MTTR)** | ${avgRestoreHours !== 'N/A' ? avgRestoreHours + ' hours' : 'No incidents'} | 30d | ${avgRestoreHours === 'N/A' ? '⚪ N/A' : avgRestoreHours < 1 ? '🟢 Elite' : avgRestoreHours < 24 ? '🟡 High' : '🔴 Low'} |

            > DORA Level 参考: Elite (top tier) / High / Medium / Low
            > 数据来源: GitHub API (commits, PRs, issues)
            > 统计时间: ${now.toISOString().split('T')[0]}
            `;

            const summary = `${baseSummary}\n${qualitySection}`;

            core.summary.addRaw(summary.split('\n').map(l => l.trim()).join('\n'));
            await core.summary.write();

            // --- Create/Update DORA Report Issue ---
            const issueTitle = `📊 DORA Metrics Report — ${now.toISOString().split('T')[0]}`;

            // Close previous week's report issue (if any)
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'dora-report',
              state: 'open',
              per_page: 5
            });

            for (const issue of existingIssues.data) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed'
              });
            }

            // Create new report issue
            const issueBody = `## DORA Metrics Weekly Report

            > 自动生成于 ${now.toISOString().split('T')[0]}（每周一 UTC 09:00）

            ${summary.split('\n').map(l => l.trim()).join('\n')}

            ### 趋势对比
            > 本周与上周的对比数据将在 D3 任务中补充。

            ---
            *此 Issue 由 dora-metrics.yml 自动创建，每周更新。*`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: issueTitle,
              body: issueBody,
              labels: ['dora-report', 'governance']
            });

            // --- Update docs/DORA-REPORT.md ---
            let fileSha;
            let existingRows = [];
            try {
              const file = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: 'docs/DORA-REPORT.md',
                ref: 'develop'
              });
              fileSha = file.data.sha;

              const existingContent = Buffer.from(file.data.content, 'base64').toString('utf8');
              const rowRegex = /^\|\s*(\d{4}-\d{2}-\d{2})\s*\|\s*([^|]+)\|\s*([^|]+)\|\s*([^|]+)\|\s*([^|]+)\|\s*([^|]+)\|\s*([^|]+)\|\s*([^|]+)\|\s*$/gm;
              let match;
              while ((match = rowRegex.exec(existingContent)) !== null) {
                existingRows.push({
                  date: match[1].trim(),
                  deployFreq7d: match[2].trim(),
                  avgLeadTimeHours: match[3].trim(),
                  cfr: match[4].trim(),
                  avgRestoreHours: match[5].trim(),
                  ciGreenRate: match[6].trim(),
                  openSecurityFindings: match[7].trim(),
                  coveragePercent: match[8].trim()
                });
              }
            } catch (e) {
              fileSha = undefined;
              existingRows = [];
            }

            const today = now.toISOString().split('T')[0];
            const currentRow = {
              date: today,
              deployFreq7d: String(deployFreq7d),
              avgLeadTimeHours: String(avgLeadTimeHours),
              cfr: String(cfr),
              avgRestoreHours: String(avgRestoreHours),
              ciGreenRate: ciGreenRate === 'N/A' ? 'N/A' : `${ciGreenRate}`,
              openSecurityFindings: String(openSecurityFindings),
              coveragePercent: String(coveragePercent)
            };

            const mergedRows = [
              currentRow,
              ...existingRows.filter(row => row.date !== today)
            ].slice(0, 12);

            const historyRows = mergedRows
              .map(row => `| ${row.date} | ${row.deployFreq7d} | ${row.avgLeadTimeHours} | ${row.cfr} | ${row.avgRestoreHours} | ${row.ciGreenRate} | ${row.openSecurityFindings} | ${row.coveragePercent} |`)
              .join('\n');

            const reportContent = `# DORA Metrics Report

            > 最后更新：${now.toISOString().split('T')[0]}
            > 数据来源：GitHub API（自动收集）

            ${summary.split('\n').map(l => l.trim()).join('\n')}

            ## 历史趋势

            | 日期 | 部署频率(周) | 前置时间(h) | 失败率(%) | MTTR(h) | CI绿率(%) | 安全Issue | 覆盖率 |
            |------|-------------|-------------|----------|---------|----------|----------|--------|
            ${historyRows}

            > 注：保留最近 12 周趋势记录。

            ## 基线与目标

            | 指标 | 基线 (2026-03) | 目标 | 状态 |
            |------|---------------|------|------|
            | CI 绿率 | — | ≥ 90% | 待建立基线 |
            | 安全 Issue | — | 0 open | 待建立基线 |
            | 测试覆盖率 | — | ≥ 50% (Phase 1) | 待建立基线 |
            | 部署频率 | — | ≥ 1/day | 待建立基线 |
            | 变更前置时间 | — | < 24h | 待建立基线 |
            | 变更失败率 | — | < 5% | 待建立基线 |
            | MTTR | — | < 1h | 待建立基线 |

            > 注：更早的历史数据请查看 Actions 运行记录。

            ---
            *此文件由 dora-metrics.yml 自动更新。*
            `;

            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'docs/DORA-REPORT.md',
              message: 'docs: update DORA metrics report [skip ci]',
              content: Buffer.from(reportContent).toString('base64'),
              branch: 'develop',
              ...(fileSha ? { sha: fileSha } : {})
            });

            console.log('DORA metrics collected successfully.');
