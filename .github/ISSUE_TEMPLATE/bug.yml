name: "Bug 报告"
description: "报告一个 Bug"
title: "[Bug]: "
labels: ["type: bug", "status: needs review"]
body:
  - type: input
    id: roadmap_ref
    attributes:
      label: "ROADMAP Ref"
      description: "关联的 ROADMAP 目标 ID（格式: R-Px-xx）。紧急 bug 填 HOTFIX，基础设施问题填 INFRA"
      placeholder: "R-P1-01 或 HOTFIX"
    validations:
      required: true

  - type: textarea
    id: background
    attributes:
      label: "背景/动机"
      description: "什么场景下发现了这个 Bug？影响了什么？"
      placeholder: "用户在结账时遇到 xxx 错误，导致无法完成购买..."
    validations:
      required: true

  - type: textarea
    id: symptom
    attributes:
      label: "现象"
      description: "出了什么问题？怎么复现？影响范围是什么？"
      placeholder: "用户在 xxx 页面点击 yyy 按钮后，出现 zzz 错误。影响所有用户/部分用户/特定条件下触发..."
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: 清晰描述这个 Bug 是什么
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开 xxx 页面
        2. 点击 xxx 按钮
        3. 看到 xxx 错误
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: 严重程度
      options:
        - "P0 — 阻断性"
        - "P1 — 主流程受影响"
        - "P2 — 次要功能问题"
        - "P3 — 外观/体验"
    validations:
      required: true

  - type: textarea
    id: root-cause
    attributes:
      label: "根因分析"
      description: "为什么出了这个问题？排查过程是什么？最终定位到哪里？（创建时如未排查可先填「待排查」，提交修复 PR 前必须补充实际内容，否则 CI 会拦截）"
      placeholder: "排查发现是 xxx 函数中 yyy 变量未做空值检查，导致..."
    validations:
      required: true

  - type: textarea
    id: fix
    attributes:
      label: "修复方案"
      description: "怎么修的？改了哪些文件？为什么选择这个方案？（创建时如未修复可先填「待修复」，提交修复 PR 前必须补充实际内容，否则 CI 会拦截）"
      placeholder: "在 xxx.ts 第 N 行增加空值检查..."
    validations:
      required: true

  - type: textarea
    id: prevention
    attributes:
      label: "防止再发"
      description: "怎么避免以后再出同样的问题？需要加测试/告警/文档吗？（创建时如未确定可先填「待确认」，提交修复 PR 前必须补充实际内容，否则 CI 会拦截）"
      placeholder: "已补充单元测试覆盖该场景 / 已添加 CI 检查 / ..."
    validations:
      required: true
