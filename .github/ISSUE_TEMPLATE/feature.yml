name: "Feature 需求"
description: "提交新功能需求"
title: "[Feature]: "
labels: ["type: feature", "status: needs review"]
body:
  - type: markdown
    attributes:
      value: |
        ## 功能需求模板（升级版）
        请完整填写以下信息，以通过 CI 门禁（ROADMAP / 背景动机 / AI 质量审查 / Project Board）。

        - 提交后请确认 Issue 已加入 **NordHjem Engineering Roadmap** Project。
        - Owner 审核通过后会添加 `approved` label。

  - type: input
    id: roadmap_ref
    attributes:
      label: "ROADMAP Ref"
      description: "关联的 ROADMAP 目标 ID（格式: R-Px-xx）。紧急修复填 HOTFIX，基础设施维护填 INFRA"
      placeholder: "R-P1-01"
    validations:
      required: true

  - type: textarea
    id: background
    attributes:
      label: "背景/动机"
      description: "为什么要做这个功能？解决什么问题？"
      placeholder: "当前系统存在 xxx 问题，导致 yyy..."
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 需求描述
      description: 清晰描述这个功能要做什么
      placeholder: "用户可以在购物车页面修改商品数量..."
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: 验收标准（Acceptance Criteria）
      description: 列出可验证的验收条件（建议 Given-When-Then 或打勾清单）
      placeholder: |
        - [ ] Given xxx, when yyy, then zzz
        - [ ] API 返回状态码与错误信息符合约定
        - [ ] 包含必要测试（单测/集成测试）
        - [ ] 文档已更新（如适用）
    validations:
      required: true

  - type: textarea
    id: implementation_direction
    attributes:
      label: 实现方向 / 方案草案
      description: 描述拟采用的技术方案、关键模块与边界
      placeholder: |
        - 涉及模块：Mxx
        - 主要改动：API / Workflow / Module / Subscriber
        - 风险点：兼容性、性能、回滚方案
    validations:
      required: true

  - type: textarea
    id: out_of_scope
    attributes:
      label: 非目标范围（Out of Scope）
      description: 明确本次不做什么，防止范围蔓延
      placeholder: |
        - 不改动数据库 schema
        - 不涉及前端 UI 改造
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: 影响范围
      options:
        - "后端 API"
        - "前端 UI"
        - "前后端都涉及"
        - "CI/CD"
        - "文档"
    validations:
      required: true

  - type: textarea
    id: tech_notes
    attributes:
      label: 技术备注（可选）
      description: CTO 或 Owner 对实现方式的要求或建议
      placeholder: "需要调用 Medusa 的 xxx API..."
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      options:
        - "P0 — 紧急"
        - "P1 — 高"
        - "P2 — 中"
        - "P3 — 低"
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: 依赖与阻塞项（可选）
      description: 关联的前置 Issue / 外部依赖 / 风险
      placeholder: |
        - Refs #123
        - 依赖第三方服务配置完成
    validations:
      required: false
